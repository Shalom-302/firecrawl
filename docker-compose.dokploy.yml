# Compose Firecrawl en mode PULL pour Dokploy.
# Aucune image n'est buildée sur le VPS : l'API vient du fork (GHCR),
# playwright-service et nuq-postgres des images officielles Firecrawl,
# redis/rabbitmq des images publiques. FoundationDB retiré (backend NUQ = postgres).
name: firecrawl

x-common-service: &common-service
  image: ghcr.io/shalom-302/firecrawl:latest
  pull_policy: always
  restart: unless-stopped
  networks:
    - backend
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-common-env: &common-env
  REDIS_URL: redis://redis:6379
  REDIS_RATE_LIMIT_URL: redis://redis:6379
  PLAYWRIGHT_MICROSERVICE_URL: http://playwright-service:3000/scrape
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_DB: ${POSTGRES_DB:-postgres}
  POSTGRES_HOST: nuq-postgres
  POSTGRES_PORT: "5432"
  NUQ_RABBITMQ_URL: amqp://rabbitmq:5672
  USE_DB_AUTHENTICATION: "false"
  BULL_AUTH_KEY: ${BULL_AUTH_KEY:-}
  TEST_API_KEY: ${TEST_API_KEY:-}
  LOGGING_LEVEL: ${LOGGING_LEVEL:-WARN}
  # --- Empreinte minimale (ne pas étouffer les autres apps du VPS) ---
  NUQ_WORKER_COUNT: "1"
  NUM_WORKERS_PER_QUEUE: "2"
  MAX_CONCURRENT_JOBS: "2"
  CRAWL_CONCURRENT_REQUESTS: "3"
  BROWSER_POOL_SIZE: "1"
  # Seuils d'auto-throttle relevés (le cap mem_limit borne déjà l'usage réel).
  MAX_RAM: "0.95"
  MAX_CPU: "0.95"
  # LLM (optionnel : nécessaire seulement pour /extract et le LLM-scraping).
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  MODEL_NAME: ${MODEL_NAME:-}

services:
  api:
    <<: *common-service
    # INTERNE uniquement : pas de port hôte, pas de Traefik, pas de domaine.
    # Joignable seulement depuis le réseau Dokploy via l'alias `firecrawl-api`.
    # → Tekawake appellera http://firecrawl-api:3002 (zéro surface publique).
    networks:
      backend: {}
      dokploy-network:
        aliases:
          - firecrawl-api
    mem_limit: 2g
    cpus: 2.0
    environment:
      <<: *common-env
      HOST: "0.0.0.0"
      PORT: "3002"
      WORKER_PORT: "3005"
      EXTRACT_WORKER_PORT: "3004"
      HARNESS_STARTUP_TIMEOUT_MS: "120000"
      ENV: local
    command: node dist/src/harness.js --start-docker
    labels:
      - "traefik.enable=false"
    depends_on:
      redis:
        condition: service_started
      playwright-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      nuq-postgres:
        condition: service_healthy

  playwright-service:
    image: ghcr.io/firecrawl/playwright-service:latest
    pull_policy: always
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      PORT: "3000"
      MAX_CONCURRENT_PAGES: "2"
      BLOCK_MEDIA: "true"
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    restart: unless-stopped
    mem_limit: 256m
    command: redis-server --bind 0.0.0.0 --maxmemory 200mb --maxmemory-policy allkeys-lru
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    mem_limit: 512m
    command: rabbitmq-server
    healthcheck:
      # RabbitMQ met souvent 40-60s à démarrer : fenêtre large pour éviter
      # le "unhealthy" prématuré qui bloquait le service api (depends_on).
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    networks:
      - backend

  nuq-postgres:
    image: ghcr.io/firecrawl/nuq-postgres:latest
    pull_policy: always
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - nuq-pgdata:/var/lib/postgresql/data
    healthcheck:
      # api/workers ne démarrent qu'une fois Postgres prêt à accepter des
      # connexions (sinon EAI_AGAIN/ECONNREFUSED → le harness tue tout).
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s
    networks:
      - backend

networks:
  backend:
    driver: bridge
  # Réseau partagé créé par Dokploy (Traefik y est branché).
  dokploy-network:
    external: true

volumes:
  nuq-pgdata:
