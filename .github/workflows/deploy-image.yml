name: Deploy API Image to GHCR (fork)

# Build de l'image API Firecrawl et push vers le GHCR du fork.
# Réécrit pour un fork : runners GitHub-hosted (plus de Blacksmith) +
# actions docker/* standards. Image = ghcr.io/<owner>/firecrawl.
on:
  push:
    branches:
      - main
    paths:
      - apps/api/**
      - .github/workflows/deploy-image.yml
  workflow_dispatch:
    inputs:
      platforms:
        description: Plateformes cibles (amd64 seul = rapide ; +arm64 = lent via QEMU)
        required: false
        default: linux/amd64
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64

concurrency:
  group: firecrawl-api-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Le Dockerfile compile Rust + Go + télécharge FoundationDB : on libère
      # de l'espace disque sinon le build peut échouer faute de place.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          sudo docker image prune --all --force || true
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Calcule les tags + met le nom d'image en minuscules (GHCR l'exige ;
      # "Shalom-302" -> "shalom-302").
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/firecrawl
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé
        run: |
          echo "### Image poussée :tada:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
